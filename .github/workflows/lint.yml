name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Format check — fast, no build required.
  # Fails the PR if any file would be changed by clang-format.
  # Run  python3 scripts/run_code_check.py  locally to auto-fix.
  # ──────────────────────────────────────────────────────────────
  format-check:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          # Pinned version lives in scripts/checkClangVersion.sh — single
          # source of truth shared with the local dev workflow.
          CLANG_VERSION="$(scripts/checkClangFormatVersion.sh --print-primary-version)"
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-${CLANG_VERSION} main"
          sudo apt-get update -qq
          sudo apt-get install -y "clang-format-${CLANG_VERSION}"
          sudo ln -sf "/usr/bin/clang-format-${CLANG_VERSION}" /usr/bin/clang-format

      - name: Check formatting
        run: python3 scripts/run_code_check.py --check
