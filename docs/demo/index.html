<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — Atmospheric Engine</title>
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    .page-header {
      padding: var(--spacing-xl) 0 var(--spacing-lg);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--spacing-xl);
    }
    .page-header .eyebrow {
      font-size: var(--text-sm);
      color: var(--color-primary);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: var(--spacing-sm);
    }
    .page-header h1 { margin-bottom: var(--spacing-sm); }
    .page-header p { color: var(--color-muted); }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-2xl);
    }
    .demo-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      overflow: hidden;
    }
    .demo-thumb {
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--color-border);
    }
    .demo-body { padding: var(--spacing-md) var(--spacing-lg); }
    .demo-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: var(--spacing-xs);
    }
    .demo-desc {
      font-size: var(--text-sm);
      color: var(--color-muted);
      margin-bottom: var(--spacing-md);
      line-height: 1.6;
    }
    .demo-badge {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      border: 1px solid var(--color-border);
      color: var(--color-muted);
    }
    .demo-badge.wip { color: var(--color-warn); border-color: var(--color-warn); }
    .demo-badge.coming { color: var(--color-muted); }

    .build-note {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-xl);
    }
    .build-note h3 { font-size: var(--text-base); margin-bottom: var(--spacing-sm); }
    .build-note p { font-size: var(--text-sm); color: var(--color-muted); margin-bottom: var(--spacing-sm); }
    .build-note p:last-child { margin-bottom: 0; }

    footer {
      border-top: 1px solid var(--color-border);
      padding: var(--spacing-lg) 0;
      text-align: center;
      font-size: var(--text-sm);
      color: var(--color-muted);
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="nav-logo">Atmospheric</a>
    <a href="../documentation/index.html">Docs</a>
    <a href="../devlog/index.html">Devlog</a>
    <a href="index.html" style="color: var(--color-text);">Demo</a>
    <a href="https://github.com/painfulexistence/Atmospheric" target="_blank">GitHub ↗</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <p class="eyebrow">WebAssembly Builds</p>
    <h1>Demo</h1>
    <p>Live examples running in the browser — no install required.</p>
  </div>

  <div class="build-note">
    <h3>Building for Web</h3>
    <p>Each demo is compiled to WebAssembly with Emscripten. To build locally:</p>
    <pre><code>./scripts/buildWasm.sh release</code></pre>
  </div>

  <div class="demo-grid">

  </div>
</div>

<footer>
  <div class="container">
    Atmospheric Engine — <a href="../index.html">Home</a>
  </div>
</footer>

</body>
</html>
